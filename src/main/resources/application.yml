spring:
  application:
    name: bibliotheque
  profiles:
    active: dev

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:bibliotheque}
    username: ${DB_USERNAME:bibliotheque}
    password: ${DB_PASSWORD:bibliotheque}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

  messages:
    basename: ValidationMessages
    encoding: UTF-8
    cache-duration: 3600
    fallback-to-system-locale: false

logging:
  level:
    org.hibernate.orm.connections.pooling: WARN
    org.hibernate.engine.jdbc.connections: WARN
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  file:
    name: /tmp/bibliotheque.log

springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
    try-it-out-enabled: true
  show-actuator: false
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

management:
  endpoints:
    web:
      exposure:
        include: health,info,loggers
  endpoint:
    health:
      show-details: when-authorized
    loggers:
      enabled: true

